name: Continuous Integration

on:
  push:
    branches:
      - 'master'
      - 'experiments/**/*'
      - '_integration/**/*'
    tags:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  actions: read # Allow upload-sarif to get the action run status
  contents: read # Required for actions/checkout
  id-token: write # Required for requesting the OIDC token
  security-events: write # Allow upload-sarif to upload the SARIF file

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: small-al2023

    steps:
      - name: Setup Credentials
        uses: Workiva/gha-setup-credentials@v2.1.1

      - name: Checkout
        id: checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

      - uses: Workiva/gha-upload-test-reports@v2.0.17

      # Check dist
      - name: Build dist/ Directory
        id: build
        run: npm run bundle

      # This will fail the workflow if the `dist/` directory is different than
      # expected.
      - name: Compare Directories
        id: diff
        run: |
          if [ ! -d dist/ ]; then
            echo "Expected dist/ directory does not exist.  See status below:"
            ls -la ./
            exit 1
          fi
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff --ignore-space-at-eol --text dist/
            exit 1
          fi

      # If `dist/` was different than expected, upload the expected version as a
      # workflow artifact.
      - if: ${{ failure() && steps.diff.outcome == 'failure' }}
        name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-action:
    name: GitHub Actions Test
    runs-on: small-al2023

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v5

      - name: Test Local Action
        id: test-action
        uses: ./
